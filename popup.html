<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Scrapnote</title>
  <style>
    :root {
      color-scheme: light dark;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic Pro", "Yu Gothic", sans-serif;
      width: 320px;
      margin: 0;
      padding: 16px;
      background: #ffffff;
      color: #111827;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #1f2937; color: #f3f4f6; }
    }
    h1 {
      font-size: 14px;
      margin: 0 0 12px 0;
      color: #6b7280;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn:hover { background: #2563eb; }
    .btn:disabled { background: #9ca3af; cursor: not-allowed; }
    .shortcut {
      font-size: 11px;
      color: #9ca3af;
      margin-top: 8px;
      text-align: center;
    }
    .status {
      margin-top: 12px;
      padding: 10px;
      font-size: 12px;
      border-radius: 6px;
      display: none;
    }
    .status.success {
      background: #dcfce7;
      color: #166534;
      display: block;
    }
    .status.error {
      background: #fee2e2;
      color: #991b1b;
      display: block;
    }
    .status.loading {
      background: #dbeafe;
      color: #1e40af;
      display: block;
    }
    .tag {
      display: inline-block;
      padding: 2px 8px;
      margin: 2px 2px 0 0;
      font-size: 10px;
      background: #e0e7ff;
      color: #3730a3;
      border-radius: 10px;
    }
    .footer {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #e5e7eb;
      font-size: 11px;
      text-align: center;
    }
    .footer a {
      color: #6b7280;
      text-decoration: none;
    }
    .footer a:hover { text-decoration: underline; }
    @media (prefers-color-scheme: dark) {
      .status.success { background: #064e3b; color: #86efac; }
      .status.error { background: #7f1d1d; color: #fca5a5; }
      .status.loading { background: #1e3a8a; color: #bfdbfe; }
      .tag { background: #3730a3; color: #e0e7ff; }
      .footer { border-top-color: #374151; }
    }
  </style>
</head>
<body>
  <h1>Scrapnote</h1>
  <button id="clipBtn" class="btn">📥 このページをNotionに保存</button>
  <div class="shortcut">ショートカット: Ctrl+Shift+S</div>
  <div id="status" class="status"></div>
  <div class="footer">
    <a href="#" id="optionsLink">⚙️ 設定</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
